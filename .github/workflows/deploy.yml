name: Deploy to AWS Lambda

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  LAMBDA_FUNCTION_NAME: jobbernaut-tabs-backend
  ROLE_NAME: jobbernaut-tabs-backend-github-actions-role

permissions:
  id-token: write
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "25"
          cache: maven

      - name: Test and Build
        run: mvn -B verify

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: function-zip
          path: target/function.zip
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: test-and-build
    steps:
      - name: Check AWS configuration
        run: |
          if [ -z "${{ vars.AWS_ACCOUNT_ID }}" ]; then
            echo "::error::AWS_ACCOUNT_ID is not configured. Add it to GitHub Actions variables before deploying."
            exit 1
          fi

      - name: Download build artifact
        uses: actions/download-artifact@v7
        with:
          name: function-zip
          path: target/

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/${{ env.ROLE_NAME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --zip-file fileb://target/function.zip