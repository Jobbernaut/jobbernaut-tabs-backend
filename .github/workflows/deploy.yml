name: Deploy to AWS Lambda

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1 # fill in later
  LAMBDA_FUNCTION_NAME: jobbernaut-tabs-backend # fill in later
  ECR_REPOSITORY: jobbernaut-tabs-backend # fill in later

permissions:
  id-token: write
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "25"
          cache: maven

      - name: Test and Build
        run: mvn -B verify

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: quarkus-app
          path: target/quarkus-app/
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: test-and-build
    steps:
      - name: Check AWS configuration
        run: |
          if [ -z "${{ vars.AWS_ACCOUNT_ID }}" ]; then
            echo "::error::AWS_ACCOUNT_ID is not configured. Add it to GitHub Actions variables before deploying."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6

      - name: Download build artifact
        uses: actions/download-artifact@v7
        with:
          name: quarkus-app
          path: target/quarkus-app/

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-jobbernaut
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --image-uri ${{ steps.build-image.outputs.image }}
